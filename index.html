<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="서류도우미">
<meta name="theme-color" content="#2563eb">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민원 서류 도우미</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root {
    --easy-light: #d1fae5; --easy: #10b981;
    --medium-light: #fef3c7; --medium: #f59e0b;
    --hard-light: #fee2e2; --hard: #ef4444;
    --bg: #f0f2f5; --paper: #fff;
    --border: #94a3b8; --text: #1e293b; --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); min-height: 100vh; padding: 24px 16px; }

  .header { max-width: 960px; margin: 0 auto 24px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .upload-box {
    max-width: 960px; margin: 0 auto 24px;
    background: var(--paper); border-radius: 12px;
    padding: 32px; text-align: center;
    border: 2px dashed #cbd5e1; cursor: pointer;
  }
  .upload-box:hover { border-color: #3b82f6; }
  .upload-box input { display: none; }
  .upload-btn {
    display: inline-block; margin-top: 16px;
    background: #2563eb; color: white; border: none;
    padding: 10px 24px; border-radius: 8px;
    font-size: 15px; cursor: pointer; font-family: inherit;
  }

  .loading {
    max-width: 960px; margin: 0 auto 24px;
    background: var(--paper); border-radius: 12px;
    padding: 32px; text-align: center; display: none;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #e2e8f0; border-top-color: #2563eb;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .doc-wrapper {
    max-width: 960px; margin: 0 auto 16px;
    background: var(--paper); border-radius: 12px;
    padding: 32px; display: none;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .legend {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 1px solid #e2e8f0;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  /* 서류 테이블 공통 스타일 */
  #docTable table {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  #docTable td, #docTable th {
    border: 1px solid var(--border);
    padding: 5px 7px; vertical-align: middle;
  }
  #docTable .label-cell {
    background: #f1f5f9; font-weight: 500;
    color: var(--muted); text-align: center;
    font-size: 11px; white-space: nowrap;
  }
  #docTable .section-label {
    background: #e2e8f0; font-weight: 700;
    text-align: center; font-size: 11px; padding: 6px 4px;
  }
  #docTable .field {
    cursor: pointer; transition: filter 0.15s;
    padding: 6px 8px; min-height: 28px; font-size: 11px;
    color: #94a3b8; font-style: italic;
  }
  #docTable .field:hover { filter: brightness(0.92); }
  #docTable .field.easy { background: var(--easy-light); border-left: 3px solid var(--easy); }
  #docTable .field.medium { background: var(--medium-light); border-left: 3px solid var(--medium); }
  #docTable .field.hard { background: var(--hard-light); border-left: 3px solid var(--hard); }

  /* 툴팁 */
  .tooltip {
    display: none; position: fixed; z-index: 9999;
    background: #1e293b; color: #f8fafc;
    padding: 14px 18px; border-radius: 10px;
    max-width: 300px; font-size: 13px; line-height: 1.6;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    pointer-events: none;
  }
  .tooltip.visible { display: block; }
  .tooltip-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; color: #93c5fd; }
  .diff-badge {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border-radius: 10px; margin-bottom: 6px; font-weight: 600; color: white;
  }
  .badge-easy { background: var(--easy); }
  .badge-medium { background: var(--medium); }
  .badge-hard { background: var(--hard); }
  .tooltip-example {
    margin-top: 8px; padding: 6px 8px;
    background: rgba(255,255,255,0.1); border-radius: 4px; font-size: 11px;
  }
  .tooltip-example span { color: #6ee7b7; font-weight: 600; }

  /* 질문 */
  .qa-section {
    max-width: 960px; margin: 0 auto;
    background: var(--paper); border-radius: 12px;
    padding: 20px; display: none;
  }
  .qa-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
  .qa-input { display: flex; gap: 8px; }
  .qa-input input {
    flex: 1; padding: 10px 14px;
    border: 1px solid #e2e8f0; border-radius: 8px;
    font-size: 14px; font-family: inherit;
  }
  .qa-input button {
    background: #2563eb; color: white; border: none;
    padding: 10px 20px; border-radius: 8px;
    cursor: pointer; font-family: inherit; font-size: 14px;
  }
  .qa-answer {
    margin-top: 12px; padding: 12px;
    background: #f8fafc; border-radius: 8px;
    font-size: 13px; line-height: 1.7;
    display: none; white-space: pre-wrap;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📋 서류 도우미</h1>
  <p>서류 사진을 업로드하면 각 칸 작성법을 알려드려요 — 칸에 마우스를 올리거나 터치하세요</p>
</div>

<div class="upload-box" onclick="document.getElementById('fileInput').click()">
  <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
  <div style="font-size:48px;margin-bottom:12px">📄</div>
  <p style="font-size:16px;font-weight:600">서류 사진을 업로드하세요</p>
  <p style="font-size:13px;color:#64748b;margin-top:8px">모든 서류 지원</p>
  <button class="upload-btn">📷 사진 선택하기</button>
</div>

<div class="loading" id="loadingBox">
  <div class="spinner"></div>
  <p style="font-weight:600">서류 분석 중...</p>
  <p style="font-size:13px;color:#64748b;margin-top:6px">잠시만 기다려주세요</p>
</div>

<div class="doc-wrapper" id="docWrapper">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>쉬움 — 바로 작성 가능</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>보통 — 서류 확인 필요</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>어려움 — 전문가 확인 권장</div>
    <p style="font-size:12px;color:#64748b;margin-left:auto">각 칸에 마우스를 올리거나 터치하세요</p>
  </div>
  <div id="docTable"></div>
</div>

<div class="qa-section" id="qaSection">
  <h3>💬 추가 질문</h3>
  <div class="qa-input">
    <input type="text" id="questionInput" placeholder="궁금한 점을 물어보세요">
    <button onclick="askQuestion()">질문하기</button>
  </div>
  <div class="qa-answer" id="qaAnswer"></div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tt-title"></div>
  <div id="tt-diff"></div>
  <div id="tt-desc"></div>
  <div class="tooltip-example" id="tt-example"></div>
</div>

<script>
const tooltip = document.getElementById('tooltip');

async function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  document.getElementById('loadingBox').style.display = 'block';
  document.getElementById('docWrapper').style.display = 'none';
  document.getElementById('qaSection').style.display = 'none';

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('/analyze', { method: 'POST', body: formData });
    const data = await res.json();
    document.getElementById('docTable').innerHTML = data.table;
    attachTooltips();
    document.getElementById('docWrapper').style.display = 'block';
    document.getElementById('qaSection').style.display = 'block';
  } catch(e) {
    alert('분석 중 오류가 발생했어요. 다시 시도해주세요.');
  } finally {
    document.getElementById('loadingBox').style.display = 'none';
  }
}

function attachTooltips() {
  const diffLabels = {
    easy: ['badge-easy', '✅ 쉬움 — 바로 작성 가능'],
    medium: ['badge-medium', '⚠️ 보통 — 서류 확인 필요'],
    hard: ['badge-hard', '🔴 어려움 — 전문가 확인 권장']
  };

  document.querySelectorAll('#docTable .field').forEach(el => {
    const show = (e) => {
      const title = el.dataset.title;
      const desc = el.dataset.desc;
      const example = el.dataset.example;
      const diff = [...el.classList].find(c => ['easy','medium','hard'].includes(c)) || 'easy';
      if (!title) return;

      document.getElementById('tt-title').textContent = title;
      const [cls, label] = diffLabels[diff];
      document.getElementById('tt-diff').innerHTML = `<span class="diff-badge ${cls}">${label}</span>`;
      document.getElementById('tt-desc').textContent = desc || '';
      document.getElementById('tt-example').innerHTML = `<span>예시:</span> ${example || ''}`;
      tooltip.classList.add('visible');
      posTooltip(e);
    };

    const move = (e) => { if (tooltip.classList.contains('visible')) posTooltip(e); };
    const hide = () => tooltip.classList.remove('visible');

    el.addEventListener('mouseenter', show);
    el.addEventListener('mousemove', move);
    el.addEventListener('mouseleave', hide);
    el.addEventListener('touchstart', e => { e.preventDefault(); show(e); }, {passive: false});
    el.addEventListener('touchend', hide);
  });
}

function posTooltip(e) {
  const x = e.clientX || (e.touches?.[0]?.clientX) || 0;
  const y = e.clientY || (e.touches?.[0]?.clientY) || 0;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = x + 14, top = y + 14;
  if (left + tw > vw - 8) left = x - tw - 14;
  if (top + th > vh - 8) top = y - th - 14;
  tooltip.style.left = Math.max(8, left) + 'px';
  tooltip.style.top = Math.max(8, top) + 'px';
}

async function askQuestion() {
  const input = document.getElementById('questionInput');
  const q = input.value.trim();
  if (!q) return;

  // 입력창 비우고 비활성화
  input.value = '';
  input.disabled = true;
  input.placeholder = '답변 생성 중...';
  document.querySelector('.qa-input button').disabled = true;

  const answerBox = document.getElementById('qaAnswer');
  answerBox.style.display = 'block';
  answerBox.textContent = '답변 생성 중...';

  try {
    const res = await fetch('/question', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        question: q,
        context: document.getElementById('docTable').innerHTML
      })
    });
    const data = await res.json();
    answerBox.textContent = data.result;
  } catch(e) {
    answerBox.textContent = '오류가 발생했어요. 다시 시도해주세요.';
  } finally {
    // 답변 완료 후 입력창 다시 활성화
    input.disabled = false;
    input.placeholder = '궁금한 점을 물어보세요';
    document.querySelector('.qa-input button').disabled = false;
    input.focus();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.id === 'questionInput') askQuestion();
});
</script>
</body>
</html>
