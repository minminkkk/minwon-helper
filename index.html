<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="서류도우미">
<meta name="theme-color" content="#2563eb">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민원 서류 도우미</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root {
    --easy: #10b981; --easy-light: #d1fae5;
    --medium: #f59e0b; --medium-light: #fef3c7;
    --hard: #ef4444; --hard-light: #fee2e2;
    --bg: #f0f2f5; --paper: #fff;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); min-height: 100vh; padding: 24px 16px; }

  .header { max-width: 960px; margin: 0 auto 24px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .upload-box {
    max-width: 960px; margin: 0 auto 24px;
    background: var(--paper); border-radius: 12px;
    padding: 32px; text-align: center;
    border: 2px dashed #cbd5e1; cursor: pointer;
  }
  .upload-box:hover { border-color: #3b82f6; }
  .upload-box input { display: none; }
  .upload-btn {
    display: inline-block; margin-top: 16px;
    background: #2563eb; color: white; border: none;
    padding: 10px 24px; border-radius: 8px;
    font-size: 15px; cursor: pointer; font-family: inherit;
  }

  .loading {
    max-width: 960px; margin: 0 auto 24px;
    background: var(--paper); border-radius: 12px;
    padding: 32px; text-align: center; display: none;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #e2e8f0; border-top-color: #2563eb;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 결과 레이아웃 - 좌우 분할 */
  .result-layout {
    max-width: 960px; margin: 0 auto 16px;
    display: none;
    gap: 16px;
  }

  /* 모바일: 세로 / 데스크탑: 가로 */
  @media (min-width: 768px) {
    .result-layout { display: flex; align-items: flex-start; }
    .image-panel { width: 45%; flex-shrink: 0; }
    .cards-panel { flex: 1; }
  }
  @media (max-width: 767px) {
    .result-layout { display: block; }
    .image-panel { margin-bottom: 16px; }
  }

  /* 원본 사진 패널 */
  .image-panel {
    background: var(--paper); border-radius: 12px;
    padding: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    position: sticky; top: 16px;
  }

  .image-panel h3 {
    font-size: 13px; font-weight: 600; color: var(--muted);
    margin-bottom: 10px;
  }

  .image-panel img {
    width: 100%; border-radius: 8px;
    border: 1px solid #e2e8f0;
  }

  /* 카드 패널 */
  .cards-panel {
    display: flex; flex-direction: column; gap: 10px;
  }

  .doc-title {
    background: var(--paper); border-radius: 12px;
    padding: 16px 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .doc-title h2 {
    font-size: 16px; font-weight: 700; color: #1e293b;
  }

  .legend {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-top: 8px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* 필드 카드 */
  .field-card {
    background: var(--paper); border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    cursor: pointer;
    border-left: 4px solid transparent;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .field-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .field-card.easy { border-left-color: var(--easy); }
  .field-card.medium { border-left-color: var(--medium); }
  .field-card.hard { border-left-color: var(--hard); }

  .field-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }

  .diff-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; color: white; flex-shrink: 0;
  }
  .badge-easy { background: var(--easy); }
  .badge-medium { background: var(--medium); }
  .badge-hard { background: var(--hard); }

  .field-name { font-size: 14px; font-weight: 600; color: #1e293b; }

  .field-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }

  .field-example {
    margin-top: 6px; padding: 5px 8px;
    background: #f8fafc; border-radius: 6px;
    font-size: 11px; color: #475569;
  }
  .field-example span { font-weight: 600; color: #2563eb; }

  /* 질문 */
  .qa-section {
    max-width: 960px; margin: 0 auto;
    background: var(--paper); border-radius: 12px;
    padding: 20px; display: none;
  }
  .qa-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
  .qa-input { display: flex; gap: 8px; }
  .qa-input input {
    flex: 1; padding: 10px 14px;
    border: 1px solid #e2e8f0; border-radius: 8px;
    font-size: 14px; font-family: inherit;
  }
  .qa-input button {
    background: #2563eb; color: white; border: none;
    padding: 10px 20px; border-radius: 8px;
    cursor: pointer; font-family: inherit; font-size: 14px;
  }
  .qa-answer {
    margin-top: 12px; padding: 12px;
    background: #f8fafc; border-radius: 8px;
    font-size: 13px; line-height: 1.7;
    display: none; white-space: pre-wrap;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📋 서류 도우미</h1>
  <p>서류 사진을 업로드하면 각 칸 작성법을 알려드려요</p>
</div>

<div class="upload-box" onclick="document.getElementById('fileInput').click()">
  <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
  <div style="font-size:48px;margin-bottom:12px">📄</div>
  <p style="font-size:16px;font-weight:600">서류 사진을 업로드하세요</p>
  <p style="font-size:13px;color:#64748b;margin-top:8px">모든 서류 지원</p>
  <button class="upload-btn">📷 사진 선택하기</button>
</div>

<div class="loading" id="loadingBox">
  <div class="spinner"></div>
  <p style="font-weight:600">서류 분석 중...</p>
  <p style="font-size:13px;color:#64748b;margin-top:6px">잠시만 기다려주세요</p>
</div>

<!-- 결과: 좌우 분할 -->
<div class="result-layout" id="resultLayout">
  <!-- 왼쪽: 원본 사진 -->
  <div class="image-panel">
    <h3>📄 원본 서류</h3>
    <img id="originalImg" src="" alt="원본 서류">
  </div>

  <!-- 오른쪽: 칸별 설명 카드 -->
  <div class="cards-panel">
    <div class="doc-title">
      <h2 id="docTitle"></h2>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>쉬움</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>보통</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>어려움</div>
      </div>
    </div>
    <div id="fieldsContainer"></div>
  </div>
</div>

<div class="qa-section" id="qaSection">
  <h3>💬 추가 질문</h3>
  <div class="qa-input">
    <input type="text" id="questionInput" placeholder="궁금한 점을 물어보세요">
    <button onclick="askQuestion()">질문하기</button>
  </div>
  <div class="qa-answer" id="qaAnswer"></div>
</div>

<script>
let docContext = "";

async function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  // 원본 이미지 미리보기
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('originalImg').src = e.target.result;
  };
  reader.readAsDataURL(file);

  document.getElementById('loadingBox').style.display = 'block';
  document.getElementById('resultLayout').style.display = 'none';
  document.getElementById('qaSection').style.display = 'none';

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('/analyze', { method: 'POST', body: formData });
    const data = await res.json();
    renderCards(data);
    document.getElementById('resultLayout').style.display = 'flex';
    document.getElementById('qaSection').style.display = 'block';
  } catch(e) {
    alert('분석 중 오류가 발생했어요. 다시 시도해주세요.');
  } finally {
    document.getElementById('loadingBox').style.display = 'none';
  }
}

function renderCards(data) {
  document.getElementById('docTitle').textContent = data.title;
  docContext = data.fields.map(f => `${f.name}: ${f.desc} (예시: ${f.example})`).join('\n');

  const diffLabels = {
    easy: ['badge-easy', '✅ 쉬움'],
    medium: ['badge-medium', '⚠️ 보통'],
    hard: ['badge-hard', '🔴 어려움']
  };

  const container = document.getElementById('fieldsContainer');
  container.innerHTML = '';

  data.fields.forEach(field => {
    const [cls, label] = diffLabels[field.difficulty] || diffLabels.easy;
    const card = document.createElement('div');
    card.className = `field-card ${field.difficulty}`;
    card.innerHTML = `
      <div class="field-top">
        <span class="diff-badge ${cls}">${label}</span>
        <span class="field-name">${field.name}</span>
      </div>
      <div class="field-desc">${field.desc}</div>
      <div class="field-example"><span>예시:</span> ${field.example}</div>
    `;
    container.appendChild(card);
  });
}

async function askQuestion() {
  const input = document.getElementById('questionInput');
  const q = input.value.trim();
  if (!q) return;

  input.value = '';
  input.disabled = true;
  input.placeholder = '답변 생성 중...';
  document.querySelector('.qa-input button').disabled = true;

  const answerBox = document.getElementById('qaAnswer');
  answerBox.style.display = 'block';
  answerBox.textContent = '답변 생성 중...';

  try {
    const res = await fetch('/question', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, context: docContext })
    });
    const data = await res.json();
    answerBox.textContent = data.result;
  } catch(e) {
    answerBox.textContent = '오류가 발생했어요. 다시 시도해주세요.';
  } finally {
    input.disabled = false;
    input.placeholder = '궁금한 점을 물어보세요';
    document.querySelector('.qa-input button').disabled = false;
    input.focus();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.id === 'questionInput') askQuestion();
});
</script>

<div style="text-align:center; padding: 16px; font-size: 11px; color: #94a3b8; font-family: 'Noto Sans KR', sans-serif;">
  제작자: 태평
</div>
</body>
</html>
