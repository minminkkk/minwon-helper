<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="서류도우미">
<meta name="theme-color" content="#2563eb">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민원 서류 도우미</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root {
    --easy: #10b981; --easy-light: #d1fae5;
    --medium: #f59e0b; --medium-light: #fef3c7;
    --hard: #ef4444; --hard-light: #fee2e2;
    --bg: #f0f2f5; --paper: #fff; --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); min-height: 100vh; padding: 24px 16px; }

  .header { max-width: 960px; margin: 0 auto 24px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .upload-box {
    max-width: 960px; margin: 0 auto 24px;
    background: var(--paper); border-radius: 12px;
    padding: 32px; text-align: center;
    border: 2px dashed #cbd5e1; cursor: pointer;
  }
  .upload-box:hover { border-color: #3b82f6; }
  .upload-box input { display: none; }
  .upload-btn {
    display: inline-block; margin-top: 16px;
    background: #2563eb; color: white; border: none;
    padding: 10px 24px; border-radius: 8px;
    font-size: 15px; cursor: pointer; font-family: inherit;
  }

  .loading {
    max-width: 960px; margin: 0 auto 24px;
    background: var(--paper); border-radius: 12px;
    padding: 32px; text-align: center; display: none;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #e2e8f0; border-top-color: #2563eb;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 결과 영역 */
  .result-area {
    max-width: 960px; margin: 0 auto 16px;
    display: none;
  }

  .doc-title-bar {
    background: var(--paper); border-radius: 12px;
    padding: 14px 20px; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .doc-title-bar h2 { font-size: 16px; font-weight: 700; color: #1e293b; }

  .legend { display: flex; gap: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* 이미지 오버레이 컨테이너 */
  .image-container {
    background: var(--paper); border-radius: 12px;
    padding: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    position: relative;
    display: inline-block;
    width: 100%;
  }

  .image-wrap {
    position: relative;
    display: inline-block;
    width: 100%;
  }

  .image-wrap img {
    width: 100%;
    display: block;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
  }

  /* 오버레이 칸 */
  .overlay-field {
    position: absolute;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    border: 2px solid transparent;
  }

  .overlay-field.easy {
    background: rgba(16, 185, 129, 0.15);
    border-color: rgba(16, 185, 129, 0.4);
  }
  .overlay-field.medium {
    background: rgba(245, 158, 11, 0.15);
    border-color: rgba(245, 158, 11, 0.4);
  }
  .overlay-field.hard {
    background: rgba(239, 68, 68, 0.15);
    border-color: rgba(239, 68, 68, 0.4);
  }

  .overlay-field:hover, .overlay-field.active {
    border-width: 2px;
    z-index: 10;
  }
  .overlay-field.easy:hover, .overlay-field.easy.active {
    background: rgba(16, 185, 129, 0.35);
    border-color: #10b981;
  }
  .overlay-field.medium:hover, .overlay-field.medium.active {
    background: rgba(245, 158, 11, 0.35);
    border-color: #f59e0b;
  }
  .overlay-field.hard:hover, .overlay-field.hard.active {
    background: rgba(239, 68, 68, 0.35);
    border-color: #ef4444;
  }

  /* 툴팁 */
  .tooltip {
    display: none; position: fixed; z-index: 9999;
    background: #1e293b; color: #f8fafc;
    padding: 14px 18px; border-radius: 10px;
    max-width: 280px; font-size: 13px; line-height: 1.6;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    pointer-events: none;
  }
  .tooltip.visible { display: block; }
  .tooltip-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; color: #93c5fd; }
  .diff-badge {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border-radius: 10px; margin-bottom: 6px; font-weight: 600; color: white;
  }
  .badge-easy { background: var(--easy); }
  .badge-medium { background: var(--medium); }
  .badge-hard { background: var(--hard); }
  .tooltip-example {
    margin-top: 8px; padding: 6px 8px;
    background: rgba(255,255,255,0.1); border-radius: 4px; font-size: 11px;
  }
  .tooltip-example span { color: #6ee7b7; font-weight: 600; }

  /* 질문 */
  .qa-section {
    max-width: 960px; margin: 0 auto;
    background: var(--paper); border-radius: 12px;
    padding: 20px; display: none;
  }
  .qa-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
  .qa-input { display: flex; gap: 8px; }
  .qa-input input {
    flex: 1; padding: 10px 14px;
    border: 1px solid #e2e8f0; border-radius: 8px;
    font-size: 14px; font-family: inherit;
  }
  .qa-input button {
    background: #2563eb; color: white; border: none;
    padding: 10px 20px; border-radius: 8px;
    cursor: pointer; font-family: inherit; font-size: 14px;
  }
  .qa-answer {
    margin-top: 12px; padding: 12px;
    background: #f8fafc; border-radius: 8px;
    font-size: 13px; line-height: 1.7;
    display: none; white-space: pre-wrap;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📋 서류 도우미</h1>
  <p>서류 사진을 업로드하면 각 칸을 터치해서 작성법을 확인하세요</p>
</div>

<div class="upload-box" onclick="document.getElementById('fileInput').click()">
  <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
  <div style="font-size:48px;margin-bottom:12px">📄</div>
  <p style="font-size:16px;font-weight:600">서류 사진을 업로드하세요</p>
  <p style="font-size:13px;color:#64748b;margin-top:8px">모든 서류 지원</p>
  <button class="upload-btn">📷 사진 선택하기</button>
</div>

<div class="loading" id="loadingBox">
  <div class="spinner"></div>
  <p style="font-weight:600">서류 분석 중...</p>
  <p style="font-size:13px;color:#64748b;margin-top:6px">잠시만 기다려주세요</p>
</div>

<div class="result-area" id="resultArea">
  <div class="doc-title-bar">
    <h2 id="docTitle"></h2>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>쉬움</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>보통</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>어려움</div>
    </div>
  </div>
  <div class="image-container">
    <div class="image-wrap" id="imageWrap">
      <img id="originalImg" src="" alt="원본 서류">
    </div>
  </div>
</div>

<div class="qa-section" id="qaSection">
  <h3>💬 추가 질문</h3>
  <div class="qa-input">
    <input type="text" id="questionInput" placeholder="궁금한 점을 물어보세요">
    <button onclick="askQuestion()">질문하기</button>
  </div>
  <div class="qa-answer" id="qaAnswer"></div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tt-title"></div>
  <div id="tt-diff"></div>
  <div id="tt-desc"></div>
  <div class="tooltip-example" id="tt-example"></div>
</div>

<script>
const tooltip = document.getElementById('tooltip');
let docContext = "";
let fieldsData = [];

async function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  // 원본 이미지 미리보기
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('originalImg').src = e.target.result;
  };
  reader.readAsDataURL(file);

  document.getElementById('loadingBox').style.display = 'block';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('qaSection').style.display = 'none';

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('/analyze', { method: 'POST', body: formData });
    const data = await res.json();
    fieldsData = data.fields;
    docContext = data.fields.map(f => `${f.name}: ${f.desc} (예시: ${f.example})`).join('\n');
    document.getElementById('docTitle').textContent = data.title;

    // 이미지 로드 완료 후 오버레이 생성
    const img = document.getElementById('originalImg');
    if (img.complete) {
      renderOverlays(data.fields);
    } else {
      img.onload = () => renderOverlays(data.fields);
    }

    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('qaSection').style.display = 'block';
  } catch(e) {
    alert('분석 중 오류가 발생했어요. 다시 시도해주세요.');
  } finally {
    document.getElementById('loadingBox').style.display = 'none';
  }
}

function renderOverlays(fields) {
  const wrap = document.getElementById('imageWrap');
  // 기존 오버레이 제거
  wrap.querySelectorAll('.overlay-field').forEach(el => el.remove());

  const diffLabels = {
    easy: ['badge-easy', '✅ 쉬움 — 바로 작성 가능'],
    medium: ['badge-medium', '⚠️ 보통 — 서류 확인 필요'],
    hard: ['badge-hard', '🔴 어려움 — 전문가 확인 권장']
  };

  fields.forEach(field => {
    const el = document.createElement('div');
    el.className = `overlay-field ${field.difficulty}`;
    el.style.left = field.x + '%';
    el.style.top = field.y + '%';
    el.style.width = field.width + '%';
    el.style.height = field.height + '%';

    const show = (e) => {
      const [cls, label] = diffLabels[field.difficulty] || diffLabels.easy;
      document.getElementById('tt-title').textContent = field.name;
      document.getElementById('tt-diff').innerHTML = `<span class="diff-badge ${cls}">${label}</span>`;
      document.getElementById('tt-desc').textContent = field.desc || '';
      document.getElementById('tt-example').innerHTML = `<span>예시:</span> ${field.example || ''}`;
      tooltip.classList.add('visible');

      // 활성 상태
      wrap.querySelectorAll('.overlay-field').forEach(f => f.classList.remove('active'));
      el.classList.add('active');
      posTooltip(e);
    };

    const move = (e) => { if (tooltip.classList.contains('visible')) posTooltip(e); };

    el.addEventListener('mouseenter', show);
    el.addEventListener('mousemove', move);
    el.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
      el.classList.remove('active');
    });
    el.addEventListener('touchstart', e => { e.preventDefault(); show(e); }, {passive: false});
    el.addEventListener('touchend', () => {
      setTimeout(() => tooltip.classList.remove('visible'), 2000);
    });

    wrap.appendChild(el);
  });
}

function posTooltip(e) {
  const x = e.clientX || (e.touches?.[0]?.clientX) || 0;
  const y = e.clientY || (e.touches?.[0]?.clientY) || 0;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = x + 14, top = y + 14;
  if (left + tw > vw - 8) left = x - tw - 14;
  if (top + th > vh - 8) top = y - th - 14;
  tooltip.style.left = Math.max(8, left) + 'px';
  tooltip.style.top = Math.max(8, top) + 'px';
}

// 화면 크기 바뀌면 오버레이 재생성
window.addEventListener('resize', () => {
  if (fieldsData.length > 0) renderOverlays(fieldsData);
});

async function askQuestion() {
  const input = document.getElementById('questionInput');
  const q = input.value.trim();
  if (!q) return;

  input.value = '';
  input.disabled = true;
  input.placeholder = '답변 생성 중...';
  document.querySelector('.qa-input button').disabled = true;

  const answerBox = document.getElementById('qaAnswer');
  answerBox.style.display = 'block';
  answerBox.textContent = '답변 생성 중...';

  try {
    const res = await fetch('/question', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, context: docContext })
    });
    const data = await res.json();
    answerBox.textContent = data.result;
  } catch(e) {
    answerBox.textContent = '오류가 발생했어요. 다시 시도해주세요.';
  } finally {
    input.disabled = false;
    input.placeholder = '궁금한 점을 물어보세요';
    document.querySelector('.qa-input button').disabled = false;
    input.focus();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.id === 'questionInput') askQuestion();
});

// 이미지 바깥 클릭하면 툴팁 닫기
document.addEventListener('click', e => {
  if (!e.target.classList.contains('overlay-field')) {
    tooltip.classList.remove('visible');
    document.querySelectorAll('.overlay-field').forEach(f => f.classList.remove('active'));
  }
});
</script>

<div style="text-align:center; padding: 16px; font-size: 11px; color: #94a3b8; font-family: 'Noto Sans KR', sans-serif;">
  제작자: 태평
</div>
</body>
</html>
